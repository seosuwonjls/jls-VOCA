<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서수원 JLS 단어장</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./icons/180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/512.png">
  <meta name="theme-color" content="#2f6be6">

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#f3f7ff 0%, #eef4ff 45%, #fff9fc 100%);
      color:#111;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .hero{
      background:#fff;
      border:1px solid #dfe7ff;
      border-radius:24px;
      padding:22px 20px;
      box-shadow:0 10px 30px rgba(47,107,230,.08);
      margin-bottom:18px;
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.2;
    }

    .sub{
      color:#555;
      font-size:14px;
      line-height:1.5;
    }

    .sub strong{
      color:#2f6be6;
    }

    .toolbar{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:10px;
      margin-top:18px;
    }

    .toolbar .full{
      grid-column:span 2;
    }

    .box{
      background:#fff;
      border:1px solid #dfe7ff;
      border-radius:18px;
      padding:12px;
      box-shadow:0 8px 24px rgba(47,107,230,.06);
    }

    label{
      display:block;
      font-size:12px;
      color:#666;
      margin-bottom:6px;
      font-weight:700;
    }

    select,input,button{
      width:100%;
      border:1px solid #ced8ff;
      border-radius:12px;
      padding:12px 12px;
      font-size:14px;
      background:#fff;
      outline:none;
    }

    input:focus,select:focus{
      border-color:#2f6be6;
      box-shadow:0 0 0 3px rgba(47,107,230,.12);
    }

    button{
      background:#2f6be6;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      transition:.18s;
      border:none;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(47,107,230,.18);
    }

    .ghost{
      background:#fff;
      color:#2f6be6;
      border:1px solid #cfe0ff;
    }

    .tabs{
      display:flex;
      gap:8px;
      margin:18px 0 14px;
      flex-wrap:wrap;
    }

    .tab{
      width:auto;
      padding:10px 16px;
      border-radius:999px;
      background:#fff;
      color:#2f6be6;
      border:1px solid #cfe0ff;
    }

    .tab.active{
      background:#2f6be6;
      color:#fff;
      border-color:#2f6be6;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:16px;
    }

    .stat{
      background:#fff;
      border:1px solid #dfe7ff;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 24px rgba(47,107,230,.05);
    }

    .stat .k{
      font-size:12px;
      color:#666;
      margin-bottom:8px;
      font-weight:700;
    }

    .stat .v{
      font-size:24px;
      font-weight:900;
      color:#111;
    }

    .panel{
      display:none;
    }

    .panel.active{
      display:block;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .card{
      background:#fff;
      border:1px solid #dfe7ff;
      border-radius:22px;
      padding:18px;
      box-shadow:0 12px 28px rgba(47,107,230,.06);
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:12px;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#eef4ff;
      color:#2f6be6;
      font-size:12px;
      font-weight:800;
    }

    .word{
      font-size:30px;
      font-weight:900;
      line-height:1.2;
      word-break:break-word;
    }

    .meaning{
      font-size:18px;
      font-weight:700;
      color:#222;
      line-height:1.5;
    }

    .pos{
      font-size:13px;
      color:#666;
      font-weight:700;
    }

    .example{
      font-size:14px;
      color:#555;
      line-height:1.5;
      border-top:1px dashed #e3e9ff;
      padding-top:12px;
    }

    .empty{
      background:#fff;
      border:1px dashed #bfd2ff;
      border-radius:20px;
      padding:28px;
      text-align:center;
      color:#666;
      font-weight:700;
    }

    .footer-note{
      margin-top:16px;
      font-size:13px;
      color:#666;
    }

    .quiz-wrap{
      background:#fff;
      border:1px solid #dfe7ff;
      border-radius:24px;
      padding:20px;
      box-shadow:0 12px 28px rgba(47,107,230,.06);
    }

    .quiz-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .quiz-q{
      font-size:30px;
      font-weight:900;
      margin-bottom:8px;
    }

    .quiz-sub{
      font-size:15px;
      color:#666;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .choice{
      background:#fff;
      color:#111;
      border:1px solid #d8e3ff;
      text-align:left;
      min-height:58px;
      font-weight:700;
    }

    .choice.correct{
      background:#ecfff2;
      border-color:#6cd28f;
      color:#16703a;
    }

    .choice.wrong{
      background:#fff1f1;
      border-color:#ff9b9b;
      color:#b42323;
    }

    .quiz-actions{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .small{
      width:auto;
      padding:10px 14px;
    }

    .loading{
      text-align:center;
      padding:40px 16px;
      color:#2f6be6;
      font-weight:900;
      font-size:18px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .top-actions button{
      width:auto;
      padding:10px 14px;
    }

    .file-input{
      display:none;
    }

    @media (max-width:980px){
      .toolbar{
        grid-template-columns:repeat(2,1fr);
      }
      .toolbar .full{
        grid-column:span 2;
      }
      .stats{
        grid-template-columns:repeat(2,1fr);
      }
      .cards{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:640px){
      h1{font-size:26px}
      .toolbar{
        grid-template-columns:1fr;
      }
      .toolbar .full{
        grid-column:span 1;
      }
      .stats{
        grid-template-columns:1fr 1fr;
      }
      .cards{
        grid-template-columns:1fr;
      }
      .choices{
        grid-template-columns:1fr;
      }
      .word{
        font-size:26px;
      }
      .quiz-q{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>서수원 JLS 단어장</h1>
      <div class="sub">
        학원에서 이렇게까지 만들어줬으면 단어시험 100점 받아라<br>
        <strong>vocab.csv</strong>를 자동으로 불러온다. 안 되면 아래 <strong>CSV 직접 선택</strong> 버튼으로 올리면 된다.
      </div>

      <div class="top-actions">
        <button type="button" class="ghost" onclick="document.getElementById('csvFile').click()">CSV 직접 선택</button>
        <button type="button" class="ghost" onclick="reloadCsv()">다시 불러오기</button>
      </div>
      <input id="csvFile" class="file-input" type="file" accept=".csv" />
    </div>

    <div class="box" style="margin-bottom:16px;">
      <div class="toolbar">
        <div>
          <label for="bookFilter">교재</label>
          <select id="bookFilter">
            <option value="">전체</option>
          </select>
        </div>
        <div>
          <label for="levelFilter">레벨</label>
          <select id="levelFilter">
            <option value="">전체</option>
          </select>
        </div>
        <div>
          <label for="sectionFilter">구간</label>
          <select id="sectionFilter">
            <option value="">전체</option>
          </select>
        </div>
        <div>
          <label for="chapterFilter">Chapter</label>
          <select id="chapterFilter">
            <option value="">전체</option>
          </select>
        </div>
        <div class="full">
          <label for="searchInput">검색</label>
          <input id="searchInput" type="text" placeholder="영어 / 뜻 / 품사 검색" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="button" onclick="resetFilters()">필터 초기화</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button id="tabWords" class="tab active" type="button" onclick="switchTab('words')">단어장</button>
      <button id="tabQuiz" class="tab" type="button" onclick="switchTab('quiz')">단어 테스트</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="k">전체 단어 수</div>
        <div class="v" id="statTotal">0</div>
      </div>
      <div class="stat">
        <div class="k">현재 표시 수</div>
        <div class="v" id="statFiltered">0</div>
      </div>
      <div class="stat">
        <div class="k">현재 교재</div>
        <div class="v" id="statBook">전체</div>
      </div>
      <div class="stat">
        <div class="k">현재 레벨</div>
        <div class="v" id="statLevel">전체</div>
      </div>
    </div>

    <div id="loading" class="loading">단어 데이터 불러오는 중...</div>

    <div id="wordsPanel" class="panel active">
      <div id="cards" class="cards"></div>
      <div id="emptyWords" class="empty" style="display:none;">조건에 맞는 단어가 없다.</div>
    </div>

    <div id="quizPanel" class="panel">
      <div class="quiz-wrap">
        <div class="quiz-top">
          <div>
            <div style="font-size:13px;color:#666;font-weight:700;">현재 범위에서 랜덤 출제</div>
            <div style="font-size:16px;font-weight:900;">맞힌 개수: <span id="quizScore">0</span></div>
          </div>
          <div>
            <button type="button" class="small ghost" onclick="startQuiz()">새 문제</button>
          </div>
        </div>

        <div id="quizBody">
          <div class="empty">단어가 로드되면 테스트를 시작할 수 있다.</div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      CSV 헤더 예시: 교재, 레벨, 구간, Chapter, 영어, 뜻
    </div>
  </div>

  <script>
    let allWords = [];
    let filteredWords = [];
    let currentTab = "words";
    let currentQuiz = null;
    let quizScore = 0;
    const wordMetaCache = {};

    const els = {
      loading: document.getElementById("loading"),
      cards: document.getElementById("cards"),
      emptyWords: document.getElementById("emptyWords"),
      bookFilter: document.getElementById("bookFilter"),
      levelFilter: document.getElementById("levelFilter"),
      sectionFilter: document.getElementById("sectionFilter"),
      chapterFilter: document.getElementById("chapterFilter"),
      searchInput: document.getElementById("searchInput"),
      statTotal: document.getElementById("statTotal"),
      statFiltered: document.getElementById("statFiltered"),
      statBook: document.getElementById("statBook"),
      statLevel: document.getElementById("statLevel"),
      wordsPanel: document.getElementById("wordsPanel"),
      quizPanel: document.getElementById("quizPanel"),
      tabWords: document.getElementById("tabWords"),
      tabQuiz: document.getElementById("tabQuiz"),
      quizBody: document.getElementById("quizBody"),
      quizScore: document.getElementById("quizScore"),
      csvFile: document.getElementById("csvFile")
    };

    function normalize(v){
      return String(v ?? "").trim();
    }

    function uniqueSorted(arr){
      return [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b), "ko"));
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function parseCSV(text){
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for(let i=0;i<text.length;i++){
        const ch = text[i];
        const next = text[i+1];

        if(ch === '"'){
          if(inQuotes && next === '"'){
            cell += '"';
            i++;
          }else{
            inQuotes = !inQuotes;
          }
        }else if(ch === ',' && !inQuotes){
          row.push(cell);
          cell = "";
        }else if((ch === '\n' || ch === '\r') && !inQuotes){
          if(ch === '\r' && next === '\n') i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        }else{
          cell += ch;
        }
      }

      if(cell.length > 0 || row.length > 0){
        row.push(cell);
        rows.push(row);
      }

      if(!rows.length) return [];

      const headers = rows[0].map(h => normalize(h).replace(/^\uFEFF/, ""));
      const data = [];

      for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r.some(v => normalize(v) !== "")) continue;

        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = normalize(r[idx] || "");
        });
        data.push(obj);
      }

      return data;
    }

    function mapRow(raw){
      const book = raw["교재"] || raw["book"] || raw["Book"] || "";
      const level = raw["레벨"] || raw["level"] || raw["Level"] || "";
      const section = raw["구간"] || raw["section"] || raw["Section"] || "";
      const chapter = raw["Chapter"] || raw["chapter"] || raw["CHAPTER"] || "";
      const word = raw["영어"] || raw["단어"] || raw["word"] || raw["Word"] || "";
      const meaning = raw["뜻"] || raw["의미"] || raw["meaning"] || raw["Meaning"] || "";

      return {
        book: normalize(book),
        level: normalize(level),
        section: normalize(section),
        chapter: normalize(chapter),
        word: normalize(word),
        meaning: normalize(meaning)
      };
    }

    function detectPos(word, meaning = "") {
      const w = String(word || "").trim().toLowerCase();
      const m = String(meaning || "").trim();

      if (!w) return null;

      if (w.includes(" ")) {
        if (w === "such as") return "전치사";
        if (w === "thanks to") return "전치사";
        if (w === "because of") return "전치사";
        if (w === "instead of") return "전치사";
        if (w === "according to") return "전치사";
        if (w === "due to") return "전치사";
        if (w === "in front of") return "전치사";
        if (w === "in spite of") return "전치사";
        if (w === "as well as") return "전치사";

        if (w === "at the same time") return "부사구";
        if (w === "for example") return "부사구";
        if (w === "in addition") return "부사구";

        if (/[?.!~]/.test(w)) return "표현";
        if (w.startsWith("to ")) return "동사구";

        return "구";
      }

      const exceptions = {
        choose: "동사",
        chose: "동사",
        chosen: "동사",
        mention: "동사",
        shine: "동사",
        argue: "동사",
        congratulate: "동사",
        come: "동사",
        provide: "동사",
        improve: "동사",
        use: "동사",
        show: "동사",
        explain: "동사",

        close: "형용사",
        excited: "형용사",
        biased: "형용사",
        familiar: "형용사",
        first: "형용사",
        possible: "형용사",
        important: "형용사",

        setting: "명사",
        performance: "명사",
        melody: "명사",
        language: "명사",
        tradition: "명사",
        copyright: "명사",
        shape: "명사",
        court: "명사",
        battle: "명사"
      };

      if (exceptions[w]) return exceptions[w];

      if (/고르다|언급하다|말하다|설명하다|제안하다|포함하다|사용하다|개선하다|제공하다|표현하다|보여주다|비추다|축하하다|주장하다|나오다|떨어지다|만들다/.test(m)) {
        return "동사";
      }

      if (/가까운|친한|익숙한|신이 난|신이난|흥분한|편향된|치우친|기울어진|중요한|가능한|유명한|첫|첫째|첫 번째/.test(m)) {
        return "형용사";
      }

      if (/환경|상황|장소|배경|조건|설정|무대|전통|언어|저작권|모양|형태|공연|선율|법정 분쟁/.test(m)) {
        return "명사";
      }

      if (/먼저|이미|아직|다시|곧|빨리|동시에/.test(m)) {
        return "부사";
      }

      if (m.endsWith("하다")) return "동사";
      if (m.endsWith("되다")) return "동사";

      if (/(tion|sion|ment|ness|ity|ship|ism|age|ance|ence)$/i.test(w)) return "명사";
      if (/(ous|ful|able|ible|al|ive|less|ic)$/i.test(w)) return "형용사";
      if (/(ize|ise|fy|en)$/i.test(w)) return "동사";
      if (w.endsWith("ly")) return "부사";
      if (w.endsWith("ed")) return "형용사";

      return "품사 확인";
    }

    function buildExample(word, meaning, pos){
      if(!word) return "예문 없음";

      if(pos === "동사"){
        return `I usually ${word} it carefully.`;
      }
      if(pos === "형용사"){
        return `This is a ${word} example.`;
      }
      if(pos === "명사"){
        return `${capitalize(word)} is important in this chapter.`;
      }
      if(pos === "부사"){
        return `We used it ${word}.`;
      }
      if(pos === "부사구" || pos === "전치사" || pos === "구" || pos === "표현"){
        return `Please remember the expression "${word}".`;
      }
      return "예문 없음";
    }

    function capitalize(str){
      const s = String(str || "");
      if(!s) return "";
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function getWordMeta(word, meaning){
      const cacheKey = `${normalize(word)}||${normalize(meaning)}`;
      if(wordMetaCache[cacheKey]) return wordMetaCache[cacheKey];

      const pos = detectPos(word, meaning);
      const example = buildExample(word, meaning, pos);

      const result = { pos, example };
      wordMetaCache[cacheKey] = result;
      return result;
    }

    function fillSelectOptions(selectEl, values){
      const current = selectEl.value;
      selectEl.innerHTML = `<option value="">전체</option>` + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
      if(values.includes(current)){
        selectEl.value = current;
      }
    }

    function populateFilters(){
      fillSelectOptions(els.bookFilter, uniqueSorted(allWords.map(v => v.book)));
      fillSelectOptions(els.levelFilter, uniqueSorted(allWords.map(v => v.level)));
      fillSelectOptions(els.sectionFilter, uniqueSorted(allWords.map(v => v.section)));
      fillSelectOptions(els.chapterFilter, uniqueSorted(allWords.map(v => v.chapter)));
    }

    function applyFilters(){
      const book = els.bookFilter.value;
      const level = els.levelFilter.value;
      const section = els.sectionFilter.value;
      const chapter = els.chapterFilter.value;
      const q = normalize(els.searchInput.value).toLowerCase();

      filteredWords = allWords.filter(item => {
        const meta = getWordMeta(item.word, item.meaning);
        const okBook = !book || item.book === book;
        const okLevel = !level || item.level === level;
        const okSection = !section || item.section === section;
        const okChapter = !chapter || item.chapter === chapter;

        const searchTarget = [
          item.book,
          item.level,
          item.section,
          item.chapter,
          item.word,
          item.meaning,
          meta.pos
        ].join(" ").toLowerCase();

        const okSearch = !q || searchTarget.includes(q);
        return okBook && okLevel && okSection && okChapter && okSearch;
      });

      updateStats();
      renderWords();

      if(currentTab === "quiz"){
        startQuiz();
      }
    }

    function updateStats(){
      els.statTotal.textContent = allWords.length;
      els.statFiltered.textContent = filteredWords.length;
      els.statBook.textContent = els.bookFilter.value || "전체";
      els.statLevel.textContent = els.levelFilter.value || "전체";
    }

    function renderWords(){
      if(!filteredWords.length){
        els.cards.innerHTML = "";
        els.emptyWords.style.display = "block";
        return;
      }

      els.emptyWords.style.display = "none";

      els.cards.innerHTML = filteredWords.map(item => {
        const meta = getWordMeta(item.word, item.meaning);

        return `
          <div class="card">
            <div>
              <div class="meta">
                ${item.book ? `<span class="chip">${escapeHtml(item.book)}</span>` : ""}
                ${item.level ? `<span class="chip">${escapeHtml(item.level)}</span>` : ""}
                ${item.section ? `<span class="chip">${escapeHtml(item.section)}</span>` : ""}
                ${item.chapter ? `<span class="chip">Chapter ${escapeHtml(item.chapter)}</span>` : ""}
              </div>
            </div>

            <div>
              <div class="word">${escapeHtml(item.word)}</div>
              <div class="meaning">${escapeHtml(item.meaning || "-")}</div>
            </div>

            <div>
              <div class="pos">품사: ${escapeHtml(meta.pos || "품사 확인")}</div>
              <div class="example">${escapeHtml(meta.example || "예문 없음")}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function switchTab(tab){
      currentTab = tab;
      els.tabWords.classList.toggle("active", tab === "words");
      els.tabQuiz.classList.toggle("active", tab === "quiz");
      els.wordsPanel.classList.toggle("active", tab === "words");
      els.quizPanel.classList.toggle("active", tab === "quiz");

      if(tab === "quiz"){
        startQuiz();
      }
    }

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz(){
      const pool = filteredWords.length ? filteredWords : allWords;

      if(!pool.length){
        els.quizBody.innerHTML = `<div class="empty">단어가 없어서 테스트를 시작할 수 없다.</div>`;
        return;
      }

      const answer = pool[Math.floor(Math.random() * pool.length)];
      const wrongPool = shuffle(pool.filter(v => v.word !== answer.word));
      const choices = shuffle([
        answer.meaning,
        ...wrongPool.slice(0,3).map(v => v.meaning)
      ]).filter(Boolean).slice(0,4);

      if(choices.length < 2){
        els.quizBody.innerHTML = `<div class="empty">테스트를 하려면 단어가 조금 더 필요하다.</div>`;
        return;
      }

      currentQuiz = {
        answerWord: answer.word,
        answerMeaning: answer.meaning,
        choices,
        answered: false
      };

      renderQuiz();
    }

    function renderQuiz(){
      if(!currentQuiz){
        els.quizBody.innerHTML = `<div class="empty">문제를 만들 수 없다.</div>`;
        return;
      }

      els.quizScore.textContent = quizScore;

      els.quizBody.innerHTML = `
        <div class="quiz-q">${escapeHtml(currentQuiz.answerWord)}</div>
        <div class="quiz-sub">알맞은 뜻을 골라라.</div>
        <div class="choices">
          ${currentQuiz.choices.map(choice => `
            <button type="button" class="choice" onclick="checkQuizAnswer('${encodeURIComponent(choice)}')">
              ${escapeHtml(choice)}
            </button>
          `).join("")}
        </div>
        <div class="quiz-actions">
          <button type="button" class="small ghost" onclick="startQuiz()">건너뛰기</button>
        </div>
      `;
    }

    function checkQuizAnswer(encodedChoice){
      if(!currentQuiz || currentQuiz.answered) return;

      const choice = decodeURIComponent(encodedChoice);
      currentQuiz.answered = true;

      const buttons = [...document.querySelectorAll(".choice")];
      buttons.forEach(btn => {
        const text = btn.textContent.trim();
        btn.disabled = true;

        if(text === currentQuiz.answerMeaning){
          btn.classList.add("correct");
        }
        if(text === choice && text !== currentQuiz.answerMeaning){
          btn.classList.add("wrong");
        }
      });

      if(choice === currentQuiz.answerMeaning){
        quizScore++;
        els.quizScore.textContent = quizScore;
      }

      const meta = getWordMeta(currentQuiz.answerWord, currentQuiz.answerMeaning);

      const extra = document.createElement("div");
      extra.style.marginTop = "16px";
      extra.innerHTML = `
        <div class="box" style="padding:14px;">
          <div style="font-size:14px;color:#666;font-weight:700;">정답</div>
          <div style="font-size:22px;font-weight:900;margin:6px 0 8px;">${escapeHtml(currentQuiz.answerMeaning)}</div>
          <div style="font-size:14px;color:#555;">품사: ${escapeHtml(meta.pos)}</div>
          <div style="font-size:14px;color:#555;margin-top:6px;">${escapeHtml(meta.example)}</div>
          <div style="margin-top:12px;">
            <button type="button" class="small" onclick="startQuiz()">다음 문제</button>
          </div>
        </div>
      `;
      els.quizBody.appendChild(extra);
    }

    function resetFilters(){
      els.bookFilter.value = "";
      els.levelFilter.value = "";
      els.sectionFilter.value = "";
      els.chapterFilter.value = "";
      els.searchInput.value = "";
      applyFilters();
    }

    function attachEvents(){
      els.bookFilter.addEventListener("change", applyFilters);
      els.levelFilter.addEventListener("change", applyFilters);
      els.sectionFilter.addEventListener("change", applyFilters);
      els.chapterFilter.addEventListener("change", applyFilters);
      els.searchInput.addEventListener("input", applyFilters);

      els.csvFile.addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if(!file) return;

        try{
          const text = await file.text();
          loadFromText(text);
        }catch(err){
          console.error(err);
          alert("CSV 파일을 읽지 못했다.");
        }
      });
    }

    function setLoading(isLoading, text = "단어 데이터 불러오는 중..."){
      els.loading.style.display = isLoading ? "block" : "none";
      els.loading.textContent = text;
    }

    function loadFromText(text){
      const raw = parseCSV(text);
      const mapped = raw.map(mapRow).filter(v => v.word && v.meaning);

      allWords = mapped;
      filteredWords = [...allWords];

      populateFilters();
      applyFilters();
      setLoading(false);

      if(!allWords.length){
        els.cards.innerHTML = "";
        els.emptyWords.style.display = "block";
        els.emptyWords.textContent = "vocab.csv는 읽었지만 단어 데이터가 없다. 헤더를 다시 확인해라.";
      }
    }

    async function loadCsvFile(path){
      const res = await fetch(path, { cache: "no-store" });
      if(!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
      return await res.text();
    }

    async function reloadCsv(){
      try{
        setLoading(true, "단어 데이터 다시 불러오는 중...");
        const text = await loadCsvFile("./vocab.csv");
        loadFromText(text);
      }catch(err){
        console.error(err);
        setLoading(false);
        alert("자동 불러오기에 실패했다. vocab.csv 파일명/경로 확인하거나 CSV 직접 선택으로 올려라.");
      }
    }

    async function init(){
      attachEvents();

      try{
        const text = await loadCsvFile("./vocab.csv");
        loadFromText(text);
      }catch(err){
        console.error(err);
        setLoading(false);
        els.cards.innerHTML = "";
        els.emptyWords.style.display = "block";
        els.emptyWords.textContent = "자동으로 vocab.csv를 못 찾았다. 상단의 CSV 직접 선택 버튼으로 올려라.";
      }
    }

    init();
  </script>
</body>
</html>
