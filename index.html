<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서수원 JLS 단어장</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#eaf2ff,#f7f9ff);
color:#223b70;
}

.wrap{
max-width:820px;
margin:auto;
padding:20px;
}

.topbar{
background:linear-gradient(135deg,#2f6be6,#4aa3ff);
padding:22px;
border-radius:22px;
color:white;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

h1{
margin:0 0 10px 0;
font-size:28px;
font-weight:800;
}

.path{
font-size:14px;
opacity:0.9;
margin-bottom:12px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
background:white;
padding:10px 16px;
border-radius:14px;
cursor:pointer;
font-weight:700;
color:#2f6be6;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.btn:hover{
background:#2f6be6;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
font-weight:800;
font-size:18px;
text-align:center;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-3px);
}

.word-grid{
display:grid;
gap:14px;
}

.word-card{
background:white;
border-radius:20px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.word{
font-size:22px;
font-weight:800;
}

.meaning{
font-size:16px;
margin-top:6px;
color:#555;
}

.speak-btn{
border:none;
background:#fff2dc;
border-radius:50%;
width:60px;
height:60px;
font-size:26px;
cursor:pointer;
}

.speak-btn:hover{
background:#ffe1a3;
}

.hidden-word{visibility:hidden}
.hidden-meaning{display:none}

.loading,.empty{
background:white;
padding:30px;
border-radius:18px;
text-align:center;
}

.test-wrap{
background:white;
padding:22px;
border-radius:20px;
box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

.question-box{
background:linear-gradient(135deg,#2f6be6,#4aa3ff);
color:white;
padding:24px;
border-radius:18px;
margin-bottom:16px;
text-align:center;
}

.question-word{
font-size:28px;
font-weight:800;
}

.choice-grid{
display:grid;
gap:10px;
}

.choice-btn{
padding:14px;
border-radius:12px;
border:1px solid #d9e4ff;
background:white;
cursor:pointer;
font-weight:700;
}

.choice-btn:hover{
background:#eef4ff;
}

.choice-btn.correct{
background:#ffe7c7;
}

.choice-btn.wrong{
background:#ffd6e1;
}

.test-result{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
}

.result-score{
font-size:36px;
font-weight:900;
margin-bottom:10px;
}

.result-buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<h1>서수원 JLS 단어장</h1>
<div class="path" id="path">로딩중...</div>
<div class="controls" id="controls"></div>
</div>

<div id="app" class="loading">단어 데이터 로딩중...</div>

</div>

<script>

let rawData=[]

let state={
book:null,
level:null,
section:null,
chapter:null,
hideWord:false,
hideMeaning:false,
mode:"browse"
}

let testState={
questions:[],
currentIndex:0,
score:0,
selected:null,
answered:false
}

const app=document.getElementById("app")
const controls=document.getElementById("controls")
const pathEl=document.getElementById("path")

function parseCSV(text){
const rows=text.trim().split("\n").map(r=>r.split(","))
return rows
}

function speakWord(word){
const u=new SpeechSynthesisUtterance(word)
u.lang="en-US"
speechSynthesis.speak(u)
}

function renderPath(){
let parts=["홈"]
if(state.book)parts.push(state.book)
if(state.level)parts.push(state.level)
if(state.section)parts.push(state.section)
if(state.chapter)parts.push("Chapter "+state.chapter)
pathEl.textContent=parts.join(" > ")
}

function renderControls(){

let html=""

if(state.book)html+=`<button class="btn" data-action="home">처음으로</button>`

if(state.chapter && state.mode==="browse"){
html+=`<button class="btn" data-action="toggle-meaning">${state.hideMeaning?"뜻보이기":"뜻숨기기"}</button>`
html+=`<button class="btn" data-action="toggle-word">${state.hideWord?"영어보이기":"영어숨기기"}</button>`
html+=`<button class="btn" data-action="start-test">테스트 시작</button>`
}

controls.innerHTML=html
}

function getUnique(arr,key){
return [...new Set(arr.map(x=>x[key]))]
}

function renderBooks(){

let books=getUnique(rawData,"교재")

app.innerHTML=`<div class="grid">${
books.map(b=>`<div class="card" data-type="book" data-value="${b}">${b}</div>`).join("")
}</div>`

}

function renderLevels(){

let rows=rawData.filter(x=>x["교재"]===state.book)

let levels=getUnique(rows,"레벨")

app.innerHTML=`<div class="grid">${
levels.map(l=>`<div class="card" data-type="level" data-value="${l}">${l}</div>`).join("")
}</div>`

}

function renderSections(){

let rows=rawData.filter(x=>
x["교재"]===state.book &&
x["레벨"]===state.level)

let sections=getUnique(rows,"구간")

app.innerHTML=`<div class="grid">${
sections.map(s=>`<div class="card" data-type="section" data-value="${s}">${s}</div>`).join("")
}</div>`
}

function renderChapters(){

let rows=rawData.filter(x=>
x["교재"]===state.book &&
x["레벨"]===state.level &&
x["구간"]===state.section)

let chapters=getUnique(rows,"Chapter")

app.innerHTML=`<div class="grid">${
chapters.map(c=>`<div class="card" data-type="chapter" data-value="${c}">Chapter ${c}</div>`).join("")
}</div>`

}

function getChapterRows(){
return rawData.filter(x=>
x["교재"]===state.book &&
x["레벨"]===state.level &&
x["구간"]===state.section &&
x["Chapter"]===state.chapter)
}

function renderWords(){

let rows=getChapterRows()

app.innerHTML=`<div class="word-grid">${
rows.map((r,i)=>`

<div class="word-card">

<div>
<div class="word ${state.hideWord?"hidden-word":""}">
${i+1}. ${r["영어"]}
</div>

<div class="meaning ${state.hideMeaning?"hidden-meaning":""}">
${r["뜻"]}
</div>
</div>

<button class="speak-btn" data-type="speak" data-value="${r["영어"]}">🔊</button>

</div>

`).join("")
}</div>`
}

function render(){

renderPath()
renderControls()

if(!state.book)return renderBooks()
if(!state.level)return renderLevels()
if(!state.section)return renderSections()
if(!state.chapter)return renderChapters()

renderWords()

}

app.addEventListener("click",function(e){

let el=e.target.closest("[data-type]")
if(!el)return

let type=el.dataset.type
let value=el.dataset.value

if(type==="speak"){
speakWord(value)
return
}

if(type==="book")state.book=value
if(type==="level")state.level=value
if(type==="section")state.section=value
if(type==="chapter")state.chapter=value

render()

})

controls.addEventListener("click",function(e){

let action=e.target.dataset.action

if(action==="home"){
state={book:null,level:null,section:null,chapter:null,hideWord:false,hideMeaning:false}
render()
}

if(action==="toggle-meaning"){
state.hideMeaning=!state.hideMeaning
render()
}

if(action==="toggle-word"){
state.hideWord=!state.hideWord
render()
}

})

async function loadData(){

let res=await fetch("./vocab.csv")
let text=await res.text()

let rows=parseCSV(text)

let headers=rows[0]

rawData=rows.slice(1).map(r=>{
let obj={}
headers.forEach((h,i)=>obj[h]=r[i])
return obj
})

render()

}

loadData()

</script>

</body>
</html>
