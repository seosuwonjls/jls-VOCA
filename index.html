<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f3f7ff 0%, #eef4ff 45%, #fff9fc 100%);
  color:#111;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:24px 20px 28px;
}

h1{
  margin:0 0 16px 0;
  font-size:32px;
  font-weight:800;
  letter-spacing:-0.5px;
  color:#2447a6;
}

.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(243,247,255,0.88);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:16px 0 12px 0;
  border-bottom:1px solid rgba(36,71,166,0.10);
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.btn{
  border:1px solid #d7e3ff;
  background:#fff;
  border-radius:999px;
  padding:10px 15px;
  cursor:pointer;
  font-size:14px;
  color:#2447a6;
  font-weight:800;
  transition:all .18s ease;
  box-shadow:0 4px 12px rgba(36,71,166,0.08);
}
.btn:hover{
  background:#2447a6;
  color:#fff;
  border-color:#2447a6;
  transform:translateY(-1px);
}

.path{
  font-size:14px;
  color:#6d7fb0;
  margin-bottom:10px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}

.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #dbe6ff;
  border-radius:20px;
  padding:18px 16px;
  cursor:pointer;
  min-height:96px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:20px;
  font-weight:800;
  color:#2447a6;
  box-shadow:0 10px 24px rgba(36,71,166,0.10);
  transition:all .18s ease;
}

.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:6px;
  background:linear-gradient(90deg,#2447a6 0%, #5fa8ff 48%, #ff9f43 78%, #ff7eb6 100%);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 14px 28px rgba(36,71,166,0.15);
  background:linear-gradient(180deg,#ffffff 0%, #f2f7ff 100%);
}

.word-card{
  background:linear-gradient(180deg,#ffffff 0%, #f9fbff 100%);
  border:1px solid #dde7ff;
  border-left:6px solid #5fa8ff;
  border-radius:18px;
  padding:15px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  box-shadow:0 6px 16px rgba(36,71,166,0.08);
  transition:all .18s ease;
}

.word-card:hover{
  transform:translateY(-2px);
  border-left-color:#ff9f43;
  box-shadow:0 10px 22px rgba(36,71,166,0.11);
}

.word-left{
  min-width:0;
  flex:1;
}

.word{
  font-size:18px;
  font-weight:700;
  word-break:break-word;
  color:#1d2f63;
}

.meaning{
  margin-top:7px;
  color:#6f7fa8;
  font-size:14px;
  word-break:keep-all;
  line-height:1.5;
}

.speak-btn{
  border:1px solid #d9e5ff;
  background:linear-gradient(180deg,#eef5ff 0%, #e3efff 100%);
  color:#4b7fff;
  border-radius:12px;
  width:46px;
  height:38px;
  cursor:pointer;
  font-size:18px;
  flex:0 0 auto;
  transition:all .18s ease;
  box-shadow:0 4px 10px rgba(75,127,255,0.14);
}
.speak-btn:hover{
  background:linear-gradient(180deg,#fff1e4 0%, #ffe2bf 100%);
  color:#ff8a1f;
  border-color:#ffc57c;
}

.word-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.hidden-word{visibility:hidden}
.hidden-meaning{display:none}

.loading, .empty{
  background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #dde7ff;
  border-radius:18px;
  padding:32px;
  text-align:center;
  color:#6f7fa8;
  box-shadow:0 8px 20px rgba(36,71,166,0.06);
}

/* 테스트 */
.test-wrap{
  background:linear-gradient(180deg,#ffffff 0%, #f9fbff 100%);
  border:1px solid #dde7ff;
  border-radius:22px;
  padding:22px;
  box-shadow:0 10px 24px rgba(36,71,166,0.10);
}

.test-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.test-progress{
  font-size:14px;
  color:#6d7fb0;
  font-weight:700;
}

.question-box{
  background:linear-gradient(135deg,#2447a6 0%, #3d68db 42%, #67b1ff 78%, #ff7eb6 100%);
  border:none;
  border-radius:20px;
  padding:26px 24px;
  margin-bottom:16px;
  text-align:center;
  box-shadow:0 12px 24px rgba(36,71,166,0.18);
}

.question-label{
  font-size:14px;
  color:rgba(255,255,255,0.84);
  margin-bottom:10px;
  font-weight:700;
}

.question-word{
  font-size:32px;
  font-weight:700;
  word-break:break-word;
  color:#fff;
  letter-spacing:-0.3px;
}

.choice-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.choice-btn{
  border:1px solid #dde7ff;
  background:#fff;
  border-radius:16px;
  padding:16px;
  cursor:pointer;
  font-size:16px;
  text-align:left;
  min-height:72px;
  transition:all .18s ease;
  color:#1f2340;
  box-shadow:0 4px 10px rgba(36,71,166,0.05);
  font-weight:700;
}
.choice-btn:hover{
  background:#f2f7ff;
  border-color:#c8d9ff;
  transform:translateY(-2px);
}
.choice-btn.correct{
  border-color:#ffc57c;
  background:linear-gradient(180deg,#fff5e8 0%, #ffe9cb 100%);
  color:#9a5600;
}
.choice-btn.wrong{
  border-color:#ffbfd8;
  background:linear-gradient(180deg,#fff3f8 0%, #ffe2ee 100%);
  color:#b33974;
}

.test-result{
  background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #dde7ff;
  border-radius:22px;
  padding:28px 24px;
  text-align:center;
  box-shadow:0 10px 24px rgba(36,71,166,0.10);
}

.result-score{
  font-size:36px;
  font-weight:700;
  margin-bottom:10px;
  color:#2447a6;
}

.result-sub{
  color:#6d7fb0;
  margin-bottom:18px;
  font-weight:700;
}

.result-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

@media (max-width:900px){
  .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width:700px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .word-grid{grid-template-columns:1fr}
  .choice-grid{grid-template-columns:1fr}
  .question-word{font-size:24px}
  h1{font-size:28px}
}
</style>
