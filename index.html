<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#eef3ff 0%, #f6f8ff 55%, #fdfdff 100%);
  color:#223a73;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:0 18px 28px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:100;
  margin:0 -18px 18px;
  padding:26px 22px 18px;
  background:linear-gradient(135deg,#1f63d8 0%, #2f87ff 100%);
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 12px 30px rgba(46,107,214,0.22);
}

h1{
  margin:0 0 14px 0;
  font-size:34px;
  font-weight:800;
  letter-spacing:-0.6px;
  color:#fff;
  display:flex;
  align-items:center;
  gap:12px;
}

h1::before{
  content:"JLS";
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:72px;
  height:42px;
  padding:0 10px;
  border-radius:14px;
  background:linear-gradient(135deg,#f15b6c 0%, #ffb347 55%, #4e8dff 100%);
  color:#fff;
  font-size:22px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,0.14);
}

.path{
  font-size:14px;
  color:rgba(255,255,255,0.92);
  margin-bottom:14px;
  font-weight:700;
  line-height:1.5;
  background:rgba(255,255,255,0.16);
  padding:10px 14px;
  border-radius:16px;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:4px;
}

.btn{
  border:1px solid #d6def1;
  background:#fff;
  border-radius:18px;
  padding:12px 18px;
  cursor:pointer;
  font-size:15px;
  color:#2a5fbd;
  font-weight:800;
  transition:all .18s ease;
  box-shadow:0 6px 14px rgba(46,84,160,0.08);
}

.btn:hover{
  background:#2f7df4;
  border-color:#2f7df4;
  color:#fff;
  transform:translateY(-1px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}

.card{
  background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #d9e4fb;
  border-radius:24px;
  padding:22px 16px;
  cursor:pointer;
  min-height:104px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:22px;
  font-weight:800;
  color:#244a99;
  box-shadow:0 10px 22px rgba(47,92,175,0.08);
  transition:all .18s ease;
}

.card:hover{
  background:linear-gradient(180deg,#ffffff 0%, #eef5ff 100%);
  transform:translateY(-2px);
  box-shadow:0 14px 28px rgba(47,92,175,0.12);
}

.word-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.word-card{
  background:linear-gradient(180deg,#ffffff 0%, #fcfdff 100%);
  border:1px solid #d8e0ee;
  border-radius:24px;
  padding:22px 22px 22px 26px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  box-shadow:0 10px 24px rgba(46,84,160,0.08);
  transition:all .18s ease;
}

.word-card:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 28px rgba(46,84,160,0.12);
}

.word-card:first-child{
  border:3px solid #48baf2;
  box-shadow:0 12px 26px rgba(72,186,242,0.16);
}

.word-left{
  min-width:0;
  flex:1;
}

.word{
  font-size:28px;
  font-weight:900;
  word-break:break-word;
  color:#1f478f;
  letter-spacing:-0.4px;
  line-height:1.2;
}

.meaning{
  margin-top:10px;
  color:#4f5f84;
  font-size:18px;
  word-break:keep-all;
  line-height:1.45;
  font-weight:600;
}

.speak-btn{
  border:1px solid #e1d8cf;
  background:linear-gradient(180deg,#fffdf9 0%, #f7f1ea 100%);
  border-radius:999px;
  width:92px;
  height:92px;
  cursor:pointer;
  font-size:40px;
  flex:0 0 auto;
  transition:all .18s ease;
  box-shadow:0 8px 18px rgba(76,83,102,0.10);
}

.speak-btn:hover{
  transform:scale(1.04);
  background:linear-gradient(180deg,#fff7eb 0%, #ffe9c8 100%);
}

.hidden-word{visibility:hidden}
.hidden-meaning{display:none}

.loading,.empty{
  background:#fff;
  border:1px solid #d9e4fb;
  border-radius:24px;
  padding:34px;
  text-align:center;
  color:#68789d;
  box-shadow:0 10px 22px rgba(47,92,175,0.08);
}

/* 테스트 */
.test-wrap{
  background:#fff;
  border:1px solid #d9e4fb;
  border-radius:28px;
  padding:24px;
  box-shadow:0 12px 26px rgba(47,92,175,0.10);
}

.test-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.test-progress{
  font-size:15px;
  color:#6173a0;
  font-weight:800;
}

.question-box{
  background:linear-gradient(135deg,#2166da 0%, #4aa3ff 100%);
  border:none;
  border-radius:24px;
  padding:30px 24px;
  margin-bottom:18px;
  text-align:center;
  box-shadow:0 14px 28px rgba(47,125,244,0.20);
}

.question-label{
  font-size:14px;
  color:rgba(255,255,255,0.86);
  margin-bottom:10px;
  font-weight:700;
}

.question-word{
  font-size:34px;
  font-weight:900;
  word-break:break-word;
  color:#fff;
  letter-spacing:-0.4px;
}

.choice-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.choice-btn{
  border:1px solid #dbe5f9;
  background:#fff;
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  font-size:17px;
  text-align:left;
  min-height:72px;
  transition:all .18s ease;
  color:#1f2340;
  box-shadow:0 4px 10px rgba(36,71,166,0.05);
  font-weight:700;
}

.choice-btn:hover{
  background:#f3f8ff;
  border-color:#bfd4ff;
  transform:translateY(-1px);
}

.choice-btn.correct{
  border-color:#ffc57c;
  background:linear-gradient(180deg,#fff6ea 0%, #ffe8c8 100%);
  color:#9a5600;
}

.choice-btn.wrong{
  border-color:#ffc3db;
  background:linear-gradient(180deg,#fff4f9 0%, #ffe1ee 100%);
  color:#b23f79;
}

.test-result{
  background:#fff;
  border:1px solid #d9e4fb;
  border-radius:28px;
  padding:30px 24px;
  text-align:center;
  box-shadow:0 12px 26px rgba(47,92,175,0.10);
}

.result-score{
  font-size:38px;
  font-weight:900;
  margin-bottom:10px;
  color:#2447a6;
}

.result-sub{
  color:#6678a3;
  margin-bottom:18px;
  font-weight:700;
}

.result-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}

@media (max-width:700px){
  .wrap{
    padding:0 14px 24px;
  }

  .topbar{
    margin:0 -14px 16px;
    padding:20px 16px 16px;
    border-bottom-left-radius:24px;
    border-bottom-right-radius:24px;
  }

  h1{
    font-size:26px;
  }

  h1::before{
    min-width:58px;
    height:34px;
    font-size:18px;
    border-radius:12px;
  }

  .grid{
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .word{
    font-size:22px;
  }

  .meaning{
    font-size:16px;
  }

  .speak-btn{
    width:74px;
    height:74px;
    font-size:32px;
  }

  .question-word{
    font-size:26px;
  }
}
</style>
